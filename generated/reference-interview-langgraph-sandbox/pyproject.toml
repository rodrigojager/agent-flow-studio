[project]
name = "reference-interview-langgraph-sandbox"
version = "0.1.0"
description = "Artefato LangGraph Platform gerado para sandbox de Agente de Referência."
requires-python = ">=3.12"
dependencies = [
  "pydantic-settings",
  "sqlalchemy",
  "psycopg2-binary",
  "redis",
  "openai",
  "langgraph",
  "langgraph-checkpoint-postgres",
  "psycopg[binary,pool]",
  "python-dotenv",
  "pypdf",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "langgraph-cli[inmem]",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.setuptools.packages.find]
include = ["app*"]
