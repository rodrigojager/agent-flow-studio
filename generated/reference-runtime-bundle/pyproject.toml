[project]
name = "reference-runtime-bundle"
version = "0.1.0"
description = "Runtime FastAPI multiagente gerado para Reference Runtime."
requires-python = ">=3.12"
dependencies = [
  "fastapi",
  "uvicorn[standard]",
  "pydantic-settings",
  "sqlalchemy",
  "psycopg2-binary",
  "redis",
  "openai",
  "langgraph",
  "langgraph-checkpoint-postgres",
  "psycopg[binary,pool]",
  "python-dotenv",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "httpx",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
  "integration: testes opcionais que exigem infraestrutura externa, como Postgres real",
]

[tool.setuptools.packages.find]
include = ["app*"]
